# ===================================================================
# Gradle Daemon JVM (Daemon Toolchain) Configuration
# -------------------------------------------------------------------
# Tells Gradle which JDK to use for running the Gradle Daemon itself
# (NOT the JDK used to compile our application -- that's set in
# build.gradle.kts via `java.toolchain { languageVersion = 21 }`).
#
# Why this file exists:
#   Gradle 8.x bundles a Kotlin compiler that crashes when launched
#   on JDK 24+ with `IllegalArgumentException: 26` because it cannot
#   parse the new Java version string. Pinning the daemon to JDK 21
#   keeps the build reproducible across machines regardless of what
#   the developer has set as their default `java`.
#
# Behavior:
#   - On first run, Gradle will auto-provision a Java 21 toolchain
#     (download + cache) if one is not already available locally.
#   - Subsequent runs reuse the cached toolchain.
#
# Requires Gradle >= 8.8 (this repo uses 8.14.x via the wrapper).
# ===================================================================
toolchainVersion=21
