spring.application.name=shiftapp

# ---------------------------------------------------------------------------
# TDD phase: defensively disable auto-configurations that are not needed for
# Service-layer unit tests. These are safe no-ops if the corresponding
# starters are not on the classpath, but they also make it explicit that
# we are running WITHOUT a datasource / security / web stack right now.
# ---------------------------------------------------------------------------
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
