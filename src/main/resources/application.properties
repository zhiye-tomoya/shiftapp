spring.application.name=shiftapp

# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/shiftapp_dev
spring.datasource.username=shiftapp_user
spring.datasource.password=shiftapp_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# Secret key for signing JWT tokens (MUST be at least 256 bits / 32 characters)
# In production, use environment variables instead of hardcoding!
jwt.secret=your-super-secret-key-that-should-be-at-least-256-bits-long-for-security
jwt.expiration=86400000

# ===================================================================
# LOGGING
# ===================================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
