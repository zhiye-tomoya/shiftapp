spring.application.name=shiftapp

# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/shiftapp_dev
spring.datasource.username=shiftapp_user
spring.datasource.password=shiftapp_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# Secret key for signing JWT tokens (MUST be at least 256 bits / 32 characters)
# In production, use environment variables instead of hardcoding!
jwt.secret=your-super-secret-key-that-should-be-at-least-256-bits-long-for-security

# Access token TTL (ms). Short-lived, kept in front-end memory.
# 15 minutes
jwt.access.expiration=900000

# Refresh token TTL (ms). Long-lived, transported via HttpOnly cookie.
# 7 days
jwt.refresh.expiration=604800000

# Legacy alias retained for backwards compatibility (= access expiration).
jwt.expiration=900000

# ===================================================================
# REFRESH-TOKEN COOKIE CONFIGURATION
# ===================================================================
# Cookie name written by /api/auth/login, /register, /refresh and
# cleared by /api/auth/logout.
app.auth.refresh-cookie.name=refresh_token

# Limits the cookie to auth endpoints only – it never leaks to /api/shifts etc.
app.auth.refresh-cookie.path=/api/auth

# Set to true behind HTTPS (production). Keep false for local http://localhost.
app.auth.refresh-cookie.secure=false

# SameSite policy: Lax | Strict | None. Use None only with Secure=true (cross-site SPA).
app.auth.refresh-cookie.same-site=Lax

# ===================================================================
# LOGGING
# ===================================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
